server {
    listen 80;
    server_name ryby.dom3k.pl;

    # Frontend static files
    root /opt/rybaspotting/frontend/dist;
    index index.html;

    # Photo storage — serve directly for performance
    location /photos/ {
        alias /var/lib/rybaspotting/photos/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # API proxy to Go backend — never cache
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No caching on API responses
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;

        # Increase max body size for photo uploads (10 MB)
        client_max_body_size 10M;
    }

    # Service worker — validate every time via ETag, but allow 304 responses
    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header Pragma "no-cache";
        expires -1;
    }

    # Hashed assets (JS/CSS with hash in filename) — cache forever
    location ~* "^/assets/.+\.[a-f0-9]{8}\.(js|css)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static files with hashes (workbox, etc.)
    location ~* ^/(workbox|assets)/.+\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Explicit static files (icons, manifest, etc.)
    location ~* "^/(icon-.*\.(svg|png)|manifest\.webmanifest|favicon\.(svg|png|ico)|registerSW\.js)$" {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # SPA fallback — serve index.html for all unmatched routes
    # Cache-control: no-cache (validate via ETag), but never serve stale copies
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header Pragma "no-cache";
        expires -1;
    }
}
