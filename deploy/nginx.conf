server {
    listen 80;
    server_name ryby.dom3k.pl;

    # Frontend static files
    root /opt/rybaspotting/frontend/dist;
    index index.html;

    # Photo storage — serve directly for performance
    location /photos/ {
        alias /var/lib/rybaspotting/photos/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy to Go backend
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase max body size for photo uploads (10 MB)
        client_max_body_size 10M;
    }

    # SPA fallback — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
