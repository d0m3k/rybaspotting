# Rybaspotting — Local dev environment
# ──────────────────────────────────────────────────────────
# Start:    docker compose up -d
# Stop:     docker compose down
# Logs:     docker compose logs -f
# Rebuild:  docker compose build --no-cache backend
# Wipe DB:  docker compose down -v
#
# Frontend (separate terminal, for Vite HMR):
#   cd frontend && npm run dev
#
# Then open http://localhost:5173 — Vite proxies /api → backend.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rybaspotting
      POSTGRES_PASSWORD: rybaspotting
      POSTGRES_DB: rybaspotting
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rybaspotting"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://rybaspotting:rybaspotting@db:5432/rybaspotting?sslmode=disable
      JWT_SECRET: dev-secret-change-me-in-prod
      LISTEN_ADDR: 0.0.0.0:8080
      PHOTO_DIR: /data/photos
      ALLOW_GALLERY_UPLOAD: "true"
      NEARBY_RADIUS_METERS: "30"
      MAX_PHOTO_WIDTH: "1200"
    volumes:
      - photos:/data/photos
    restart: unless-stopped

volumes:
  pgdata:
  photos:
