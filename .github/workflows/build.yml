# Rybaspotting — Build & Release
# On every push to main, builds backend + frontend and creates a release artifact.
# Download the artifact and deploy via:
#   ./scripts/deploy-from-release.sh release.tar.gz root@amy135.mikrus.xyz 10135

name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for creating releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build backend
        run: |
          cd backend
          go build -o ../dist/rybaspotting ./cmd/rybaspotting/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Package release
        run: |
          mkdir -p release/frontend/dist
          cp dist/rybaspotting release/
          cp -r frontend/dist/* release/frontend/dist/
          cp deploy/rybaspotting.service release/
          cp deploy/nginx.conf release/
          cp .env.example release/
          tar -czf rybaspotting-release.tar.gz -C release .

      - name: Upload artifact (for GitHub Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: rybaspotting-release
          path: rybaspotting-release.tar.gz
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: "Build #${{ github.run_number }} — ${{ github.event.head_commit.message }}"
          body: |
            Automated build from commit ${{ github.sha }}.

            ## 🔧 Changes
            ```
            ${{ github.event.head_commit.message }}
            ```

            ## 📥 Download
            Attached: `rybaspotting-release.tar.gz` — contains backend binary + frontend dist.

            ## 🚀 Deploy on server
            ```bash
            wget \${{ github.server_url }}/\${{ github.repository }}/releases/download/build-\${{ github.run_number }}-\${{ github.sha }}/rybaspotting-release.tar.gz
            tar -xzf rybaspotting-release.tar.gz -C /opt/rybaspotting/
            systemctl restart rybaspotting
            ```
          files: |
            rybaspotting-release.tar.gz
          generate_release_notes: false
          prerelease: false
